<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mẹ & Bé: Nhắc Nhở Thông Minh</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF85A1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --p1: #FF85A1; --p2: #74B9FF; --p3: #A29BFE; --bg: #FDF2F4;
            --text: #2D3436; --text-muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 110px; overflow-x: hidden; }

        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: var(--bg); }
        .blob { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: move 20s infinite alternate; }
        .b1 { background: var(--p1); top: -10%; left: -10%; }
        .b2 { background: var(--p2); bottom: -10%; right: -10%; animation-delay: -5s; }
        .b3 { background: var(--p3); top: 40%; left: 30%; animation-delay: -10s; }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(60px, 60px); } }

        header { padding: 40px 20px; text-align: center; background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.3); position: sticky; top: 0; z-index: 100; }
        h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, var(--p1), var(--p3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px; }

        main { padding: 25px 20px; max-width: 900px; margin: 0 auto; width: 100%; }

        .tab-content { display: none; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 40px; padding: 35px; box-shadow: 0 20px 45px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; transition: 0.4s; }
        .timer-wrap { position: relative; width: 180px; height: 180px; margin: 25px 0; }
        .timer-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(0,0,0,0.03); stroke-width: 12; }
        .circle-bar { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: 700; }

        .btn { width: 100%; padding: 20px; border-radius: 25px; border: none; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; color: white; }
        .btn-primary { background: var(--p1); box-shadow: 0 10px 20px rgba(255,133,161,0.3); }
        .btn-dark { background: #2D3436; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .form-card { background: white; border-radius: 35px; padding: 30px; margin-bottom: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.04); }
        .input-group { margin-bottom: 15px; width: 100%; }
        .input-group label { display: block; margin-bottom: 10px; font-size: 0.9rem; font-weight: 600; color: #555; }
        .input-group input, .input-group select { width: 100%; padding: 15px; border-radius: 12px; border: 2.2px solid #F5F5F5; font-size: 1rem; transition: 0.3s; }
        .input-group input:focus { border-color: var(--p1); outline: none; background: #FFF9FA; }

        .history-item { background: white; padding: 22px; border-radius: 25px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }

        .vaccine-item { background: white; padding: 22px; border-radius: 25px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
        .vaccine-item.done { background: #F0FFF4; border-color: #C6F6D5; }
        .vaccine-header { display: flex; align-items: center; gap: 15px; }
        .vaccine-check { width: 30px; height: 30px; border-radius: 10px; border: 2px solid #E2E8F0; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .done .vaccine-check { background: #48BB78; border-color: #48BB78; color: white; }
        .vaccine-date-input { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #F0F0F0; margin-top: 10px; display: none; }
        .pending .vaccine-date-input, .done .vaccine-date-input { display: block; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,0.8); display: grid; grid-template-columns: repeat(5, 1fr); padding: 12px 5px calc(15px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #A0AEC0; cursor: pointer; font-size: 0.65rem; font-weight: 600; transition: 0.3s; }
        .nav-item.active { color: var(--p1); transform: translateY(-5px); }
        .nav-item i { width: 22px; height: 22px; }

        .hidden { display: none !important; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 480px; border-radius: 45px; padding: 40px; }

        .profile-badge { background: linear-gradient(135deg, var(--p1), var(--p3)); color: white; padding: 25px; border-radius: 35px; margin-bottom: 25px; display: flex; align-items: center; gap: 20px; box-shadow: 0 15px 30px rgba(255,133,161,0.2); }
        .avatar { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Knowledge Styles */
        .audio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .audio-btn { background: white; border: 2px solid #F5F5F5; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.3s; }
        .audio-btn.playing { border-color: var(--p1); background: #FFF9FA; box-shadow: 0 8px 20px rgba(255,133,161,0.15); }
        .audio-btn i { color: var(--p1); width: 24px; height: 24px; }
        .audio-btn span { font-size: 0.75rem; font-weight: 600; color: #444; }

        .tip-card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; border-left: 6px solid var(--p1); box-shadow: 0 15px 35px rgba(0,0,0,0.04); }
        .tip-tag { background: var(--p1)22; color: var(--p1); padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .tip-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 10px; color: #2D3436; }
        .tip-content { font-size: 0.9rem; line-height: 1.6; color: #666; }

        @media (max-width: 600px) { h1 { font-size: 2rem; } .card { padding: 30px; } }
    </style>
</head>
<body>
    <div class="mesh-bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

    <header>
        <h1 id="page-title">Nhắc nhở</h1>
    </header>

    <main>
        <!-- Tab 1: Nhắc nhở -->
        <div id="tab-reminders" class="tab-content active">
            <div id="profile-summary" class="profile-badge hidden">
                <div class="avatar"><i data-lucide="baby" style="width: 30px; height: 30px;"></i></div>
                <div>
                    <h3 id="summary-name" style="font-size: 1.2rem; font-weight: 700;">Tên của bé</h3>
                    <p id="summary-age" style="font-size: 0.85rem; opacity: 0.9;">-- tháng tuổi</p>
                </div>
            </div>
            
            <div id="notification-banner" class="form-card hidden" style="display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--p1); background: #FFF9FA;">
                <p style="font-weight: 500; font-size: 0.9rem;">Bật thông báo để nhắc lịch bé mẹ nhé!</p>
                <button id="enable-notifications" class="btn" style="width: auto; padding: 10px 20px; background: var(--p1);">Bật</button>
            </div>

            <div id="task-grid" class="grid"></div>
            
            <!-- Floating Stop Alarm Button -->
            <div id="stop-alarm-container" class="hidden" style="position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 1500; width: 90%; max-width: 400px;">
                <button class="btn" onclick="stopAlert()" style="background: #2D3436; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid white;">
                    <i data-lucide="volume-x"></i> Dừng âm báo (30s)
                </button>
            </div>

            <div style="margin: 30px 0; display: flex; justify-content: center;">
                <button class="btn btn-dark" id="settings-btn" style="width: auto; padding: 12px 30px; border-radius: 50px;">
                    <i data-lucide="settings"></i> Cài đặt lịch nhắc
                </button>
            </div>
        </div>

        <!-- Tab 2: Phát triển -->
        <div id="tab-growth" class="tab-content">
            <div class="form-card">
                <h2 style="margin-bottom: 20px; font-weight: 700;">Thông số đo</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="input-group">
                        <label>Cân nặng (kg)</label>
                        <input type="number" id="growth-weight" placeholder="0.0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>Chiều cao (cm)</label>
                        <input type="number" id="growth-height" placeholder="0">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="addGrowth()">Lưu thông số</button>
            </div>
            <div id="growth-history"></div>
        </div>

        <!-- Tab 3: Tiêm chủng -->
        <div id="tab-vaccine" class="tab-content">
            <div style="display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;">
                <button class="btn" id="filter-all" onclick="filterVaccine('all')" style="background: var(--text); padding: 10px 20px; font-size: 0.85rem; min-width: fit-content;">Tất cả</button>
                <button class="btn" id="filter-pending" onclick="filterVaccine('pending')" style="background: #FFF; color: #666; padding: 10px 20px; font-size: 0.85rem; min-width: fit-content;">Chưa tiêm</button>
                <button class="btn" id="filter-done" onclick="filterVaccine('done')" style="background: #FFF; color: #666; padding: 10px 20px; font-size: 0.85rem; min-width: fit-content;">Đã tiêm</button>
            </div>
            <div id="vaccine-list"></div>
        </div>

        <!-- Tab 4: Cẩm nang -->
        <div id="tab-knowledge" class="tab-content">
            <div class="form-card" style="background: linear-gradient(135deg, #FF9A9E, #FAD0C4); color: white; border:none;">
                <h2 style="margin-bottom: 5px; font-weight: 700; font-size: 1.2rem;">Âm thanh thư giãn</h2>
                <p style="font-size: 0.8rem; opacity: 0.9;">Giúp bé dễ ngủ và mẹ giảm căng thẳng</p>
                <div class="audio-grid">
                    <div class="audio-btn" id="btn-noise-shush" onclick="toggleAudio('shush')">
                        <i data-lucide="mic"></i>
                        <span>Suỵt suỵt</span>
                    </div>
                    <div class="audio-btn" id="btn-noise-rain" onclick="toggleAudio('rain')">
                        <i data-lucide="cloud-rain"></i>
                        <span>Tiếng mưa</span>
                    </div>
                    <div class="audio-btn" id="btn-noise-ocean" onclick="toggleAudio('ocean')">
                        <i data-lucide="waves"></i>
                        <span>Sóng biển</span>
                    </div>
                    <div class="audio-btn" id="btn-noise-music" onclick="toggleAudio('music')">
                        <i data-lucide="music"></i>
                        <span>Nhạc thai giáo</span>
                    </div>
                </div>
            </div>
            <h2 style="margin: 25px 0 15px; font-weight: 700; font-size: 1.2rem;">Gợi ý cho Mẹ & Bé</h2>
            <div id="knowledge-list"></div>
        </div>

        <!-- Tab 5: Hồ sơ -->
        <div id="tab-profile" class="tab-content">
            <div class="form-card">
                <h2 style="margin-bottom: 25px; font-weight: 700;">Hồ sơ của bé</h2>
                <div class="input-group">
                    <label>Tên của bé</label>
                    <input type="text" id="baby-name" placeholder="Ví dụ: Cà Rốt">
                </div>
                <div class="input-group">
                    <label>Ngày sinh</label>
                    <input type="date" id="baby-dob">
                </div>
                <div class="input-group">
                    <label>Giới tính</label>
                    <select id="baby-gender">
                        <option value="none">Chọn giới tính</option>
                        <option value="boy">Bé trai</option>
                        <option value="girl">Bé gái</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="saveProfile()">Lưu hồ sơ</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="reminders">
            <i data-lucide="clock"></i>
            <span>Nhắc nhở</span>
        </div>
        <div class="nav-item" data-tab="growth">
            <i data-lucide="trending-up"></i>
            <span>Phát triển</span>
        </div>
        <div class="nav-item" data-tab="vaccine">
            <i data-lucide="shield-check"></i>
            <span>Tiêm chủng</span>
        </div>
        <div class="nav-item" data-tab="knowledge">
            <i data-lucide="book-open"></i>
            <span>Cẩm nang</span>
        </div>
        <div class="nav-item" data-tab="profile">
            <i data-lucide="user"></i>
            <span>Hồ sơ</span>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.3rem; font-weight: 700;">Cài đặt lịch</h2>
                <button id="close-modal" style="background:none; border:none; font-size: 2.5rem; cursor:pointer;">&times;</button>
            </div>
            <form id="settings-form">
                <div id="settings-list"></div>
                <button type="submit" class="btn btn-dark" style="margin-top: 20px;">Lưu cài đặt</button>
            </form>
        </div>
    </div>

    <script>
        // --- Data & Logic ---
        const VACCINE_LIST = [
            { id: 1, name: 'Lao (BCG)', time: 'Sơ sinh', done: false, date: '' },
            { id: 2, name: 'Viêm gan B (Mũi 1)', time: 'Sơ sinh', done: false, date: '' },
            { id: 3, name: '6 trong 1 (Mũi 1)', time: '2 tháng', done: false, date: '' },
            { id: 4, name: 'Rota (Lần 1)', time: '2 tháng', done: false, date: '' },
            { id: 5, name: 'Phế cầu (Mũi 1)', time: '2 tháng', done: false, date: '' },
            { id: 6, name: '6 trong 1 (Mũi 2)', time: '3 tháng', done: false, date: '' },
            { id: 7, name: 'Rota (Lần 2)', time: '3 tháng', done: false, date: '' },
            { id: 8, name: '6 trong 1 (Mũi 3)', time: '4 tháng', done: false, date: '' },
            { id: 9, name: 'Phế cầu (Mũi 2)', time: '4 tháng', done: false, date: '' },
            { id: 10, name: 'Cúm (Mũi 1)', time: '6 tháng', done: false, date: '' },
            { id: 11, name: 'Não mô cầu BC (Mũi 1)', time: '6 tháng', done: false, date: '' },
            { id: 12, name: 'Cúm (Mũi 2)', time: '7 tháng', done: false, date: '' },
            { id: 13, name: 'Não mô cầu BC (Mũi 2)', time: '8 tháng', done: false, date: '' },
            { id: 14, name: 'Sởi (Mũi 1)', time: '9 tháng', done: false, date: '' },
            { id: 15, name: 'Viêm não Nhật Bản (Mũi 1)', time: '9 tháng', done: false, date: '' },
            { id: 16, name: 'Sởi-Quai bị-Rubella', time: '12 tháng', done: false, date: '' },
            { id: 17, name: 'Thủy đậu (Mũi 1)', time: '12 tháng', done: false, date: '' },
            { id: 18, name: 'Viêm gan A (Mũi 1)', time: '12 tháng', done: false, date: '' },
            { id: 19, name: '6 trong 1 (Mũi 4)', time: '18 tháng', done: false, date: '' },
            { id: 20, name: 'Phế cầu (Mũi 4)', time: '18 tháng', done: false, date: '' }
        ];

        const KNOWLEDGE_BASE = [
            { id: 'nutri-1', tag: 'Dinh dưỡng', title: 'Sữa mẹ là tốt nhất', minAge: 0, maxAge: 6, content: 'Trong 6 tháng đầu, bé chỉ cần sữa mẹ hoàn toàn. Mẹ nên ăn đủ các nhóm chất, uống nhiều nước và nghỉ ngơi.' },
            { id: 'dev-1', tag: 'Phát triển', title: 'Tummy Time (Nằm sấp)', minAge: 1, maxAge: 4, content: 'Cho bé nằm sấp vài phút mỗi ngày để giúp bé cứng cổ và phát triển cơ bắp vùng vai, lưng.' },
            { id: 'nutri-2', tag: 'Dinh dưỡng', title: 'Bắt đầu ăn dặm', minAge: 6, maxAge: 8, content: 'Khi bé tròn 6 tháng, mẹ có thể bắt đầu cho bé ăn dặm với rau củ nghiền mịn.' },
            { id: 'dev-2', tag: 'Hoạt động', title: 'Trò chơi Ú òa', minAge: 6, maxAge: 12, content: 'Trò chơi này giúp bé hiểu về sự tồn tại của vật thể và tăng tương tác.' }
        ];

        let state = {
            tasks: [
                { id: 'feed', name: 'Cho bé bú/ăn', icon: 'milk', interval: 180, lastDone: null, color: '#FF85A1' },
                { id: 'pump', name: 'Hút sữa mẹ', icon: 'waves', interval: 120, lastDone: null, color: '#74B9FF' },
                { id: 'diaper', name: 'Thay bỉm', icon: 'sparkles', interval: 240, lastDone: null, color: '#A29BFE' }
            ],
            growth: [], vaccines: VACCINE_LIST, profile: { name: '', dob: '', gender: 'none' }
        };

        function load() {
            const saved = localStorage.getItem('baby_v12');
            if (saved) {
                const parsed = JSON.parse(saved);
                const merged = VACCINE_LIST.map(v => { const s = parsed.vaccines?.find(x => x.id === v.id); return s ? { ...v, ...s } : v; });
                state = { ...state, ...parsed, vaccines: merged };
            }
        }
        function save() { localStorage.setItem('baby_v12', JSON.stringify(state)); }

        // Audio
        const audioState = { context: null, source: null, playing: null, alertInterval: null };
        function stopAudio() {
            if (audioState.playing) {
                if (audioState.source && audioState.source.stop) { try { audioState.source.stop(); } catch(e) {} }
                if (audioState.alertInterval) clearInterval(audioState.alertInterval);
                audioState.playing = null;
                document.getElementById('stop-alarm-container').classList.add('hidden');
                document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('playing'));
            }
        }
        window.toggleAudio = (type) => {
            if (audioState.playing === type) { stopAudio(); return; }
            stopAudio();
            if (!audioState.context) audioState.context = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = audioState.context;
            audioState.playing = type;
            document.getElementById(`btn-noise-${type}`).classList.add('playing');
            
            if (type === 'music') {
                const music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
                music.loop = true; music.play();
                audioState.source = { stop: () => { music.pause(); music.currentTime = 0; } };
                return;
            }

            const buffer = ctx.createBuffer(1, 2 * ctx.sampleRate, ctx.sampleRate);
            const out = buffer.getChannelData(0);
            for (let i = 0; i < 2 * ctx.sampleRate; i++) out[i] = (Math.random() * 2 - 1) * 0.1 * (type === 'shush' ? Math.sin(i * 0.01) : 1);
            const src = ctx.createBufferSource(); src.buffer = buffer; src.loop = true;
            const filter = ctx.createBiquadFilter(); filter.type = type === 'rain' ? 'lowpass' : 'bandpass'; filter.frequency.value = 600;
            src.connect(filter); filter.connect(ctx.destination); src.start(); audioState.source = src;
        };

        function playAlert() {
            if (audioState.playing === 'alert') return;
            stopAudio(); audioState.playing = 'alert';
            document.getElementById('stop-alarm-container').classList.remove('hidden');
            if (!audioState.context) audioState.context = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = audioState.context;
            let idx = 0; const melody = [440, 554, 659, 880];
            const play = () => {
                if (audioState.playing !== 'alert') return;
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine';
                osc.frequency.setValueAtTime(melody[idx % 4], ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime); gain.gain.linearRampToValueAtTime(0.05, ctx.currentTime + 0.1); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
                osc.start(); osc.stop(ctx.currentTime + 1); idx++;
            };
            play(); audioState.alertInterval = setInterval(play, 1000);
            setTimeout(() => { if (audioState.playing === 'alert') stopAudio(); }, 30000);
        }
        window.stopAlert = () => stopAudio();

        // Nav
        window.switchTab = (tab, el) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            el.classList.add('active');
            document.getElementById('page-title').textContent = { reminders: 'Nhắc nhở', growth: 'Phát triển', vaccine: 'Tiêm chủng', knowledge: 'Cẩm nang', profile: 'Hồ sơ' }[tab];
            if (tab === 'reminders') renderTasks();
            if (tab === 'growth') renderGrowth();
            if (tab === 'vaccine') renderVaccines();
            if (tab === 'knowledge') renderKnowledge();
            if (tab === 'profile') renderProfile();
            window.scrollTo(0, 0);
        };
        document.querySelectorAll('.nav-item').forEach(i => i.onclick = () => switchTab(i.dataset.tab, i));

        // Logic Functions
        function renderTasks() {
            document.getElementById('task-grid').innerHTML = state.tasks.map(t => {
                const left = getLeft(t), prog = getProg(t);
                return `
                    <div class="card" id="card-${t.id}" style="margin-bottom:20px;">
                        <div style="background: ${t.color}15; padding: 20px; border-radius: 25px; margin-bottom: 10px;">
                            <i data-lucide="${t.icon}" style="color: ${t.color}; width: 30px; height: 30px;"></i>
                        </div>
                        <h2 style="font-weight: 700; font-size: 1.2rem;">${t.name}</h2>
                        <div class="timer-wrap">
                            <svg class="timer-svg" width="180" height="180">
                                <circle class="circle-bg" cx="90" cy="90" r="80"></circle>
                                <circle class="circle-bar" cx="90" cy="90" r="80" style="stroke-dasharray: 502; stroke-dashoffset: ${502*(1-prog)}; stroke: ${t.color};"></circle>
                            </svg>
                            <div class="timer-text">${fmt(left)}</div>
                        </div>
                        <button class="btn" onclick="done('${t.id}')" style="background: ${t.color};">Hoàn thành</button>
                    </div>
                `;
            }).join('');
            lucide.createIcons(); updateSummary();
        }
        const getLeft = (t) => t.lastDone ? Math.max(0, Math.floor((t.lastDone + t.interval*60*1000 - Date.now())/1000)) : 0;
        const getProg = (t) => t.lastDone ? getLeft(t) / (t.interval*60) : 0;
        const fmt = (s) => s <= 0 ? "Đến lúc!" : (Math.floor(s/3600) > 0 ? `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m` : `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`);
        window.done = (id) => { const t = state.tasks.find(x => x.id === id); if (t) { t.lastDone = Date.now(); save(); renderTasks(); if (audioState.playing === 'alert') stopAudio(); } };

        window.addGrowth = () => {
            const w = document.getElementById('growth-weight').value, h = document.getElementById('growth-height').value;
            if (!w || !h) return alert('Nhập đủ thông số mẹ nhé!');
            state.growth.unshift({ weight: w, height: h, date: new Date().toLocaleDateString('vi-VN') });
            save(); renderGrowth();
            document.getElementById('growth-weight').value = ''; document.getElementById('growth-height').value = '';
        };
        function renderGrowth() {
            document.getElementById('growth-history').innerHTML = state.growth.map(g => `<div class="history-item"><div><div style="font-weight: 700;">${g.weight} kg • ${g.height} cm</div><div style="font-size: 0.8rem; color: #999;">${g.date}</div></div><i data-lucide="baby" style="color: var(--p1);"></i></div>`).join('') || '<p style="text-align:center; color:#999;">Chưa có dữ liệu</p>';
            lucide.createIcons();
        }

        let vF = 'all';
        window.filterVaccine = (f) => { vF = f; renderVaccines(); };
        window.toggleVaccine = (id) => { const v = state.vaccines.find(x => x.id === id); if (v) { v.done = !v.done; save(); renderVaccines(); } };
        window.updateVDate = (id, d) => { const v = state.vaccines.find(x => x.id === id); if (v) { v.date = d; v.notified2Days = false; v.notifiedToday = false; save(); } };
        function renderVaccines() {
            const filtered = state.vaccines.filter(v => vF === 'all' ? true : (vF === 'done' ? v.done : !v.done));
            document.getElementById('vaccine-list').innerHTML = filtered.map(v => `<div class="vaccine-item ${v.done ? 'done' : 'pending'}" onclick="toggleVaccine(${v.id})"><div class="vaccine-header"><div class="vaccine-check">${v.done ? '✓' : ''}</div><div style="flex:1;"><div style="font-weight: 700;">${v.name}</div><div style="font-size: 0.8rem; color: #999;">${v.time}</div></div></div><input type="date" value="${v.date || ''}" onclick="event.stopPropagation()" onchange="updateVDate(${v.id}, this.value)" style="width: 100%; margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid #eee;"></div>`).join('');
        }

        function renderKnowledge() {
            let age = 0; if (state.profile.dob) age = Math.floor((Date.now() - new Date(state.profile.dob).getTime()) / (1000 * 60 * 60 * 24 * 30.44));
            const filtered = KNOWLEDGE_BASE.filter(k => age >= k.minAge && age <= k.maxAge);
            document.getElementById('knowledge-list').innerHTML = filtered.map(k => `<div class="tip-card"><span class="tip-tag">${k.tag}</span><div class="tip-title">${k.title}</div><div class="tip-content">${k.content}</div></div>`).join('') || '<p style="text-align:center; color:#999;">Cập nhật ngày sinh bé mẹ nhé!</p>';
        }

        window.saveProfile = () => {
            state.profile.name = document.getElementById('baby-name').value;
            state.profile.dob = document.getElementById('baby-dob').value;
            state.profile.gender = document.getElementById('baby-gender').value;
            save(); alert('Đã lưu hồ sơ!'); switchTab('reminders', document.querySelector('[data-tab=reminders]'));
        };
        function renderProfile() { document.getElementById('baby-name').value = state.profile.name; document.getElementById('baby-dob').value = state.profile.dob; document.getElementById('baby-gender').value = state.profile.gender; }
        function updateSummary() {
            const s = document.getElementById('profile-summary');
            if (state.profile.name) {
                s.classList.remove('hidden'); document.getElementById('summary-name').textContent = state.profile.name;
                if (state.profile.dob) {
                    const m = Math.floor((Date.now() - new Date(state.profile.dob).getTime()) / (1000 * 60 * 60 * 24 * 30.44));
                    document.getElementById('summary-age').textContent = `${m} tháng tuổi`;
                }
            } else s.classList.add('hidden');
        }

        setInterval(() => {
            state.tasks.forEach(t => {
                if (t.lastDone && getLeft(t) === 0 && !t.notified) { 
                    if (Notification.permission === 'granted') new Notification(`Đến lúc ${t.name}!`);
                    playAlert(); t.notified = true; 
                } else if (t.lastDone && getLeft(t) > 0) t.notified = false;
            });
            state.vaccines.forEach(v => {
                if (v.date && !v.done) {
                    const d = Math.ceil((new Date(v.date) - Date.now()) / (1000 * 60 * 60 * 24));
                    if (d === 2 && !v.notified2Days) { if (Notification.permission === 'granted') new Notification(`Hẹn tiêm ${v.name} sau 2 ngày`); v.notified2Days = true; save(); }
                    if (d === 0 && !v.notifiedToday) { playAlert(); v.notifiedToday = true; save(); }
                }
            });
            if (document.getElementById('tab-reminders').classList.contains('active')) {
                state.tasks.forEach(t => { const card = document.getElementById(`card-${t.id}`); if (card) { const l = getLeft(t), p = getProg(t); card.querySelector('.circle-bar').style.strokeDashoffset = 502 * (1 - p); card.querySelector('.timer-text').textContent = fmt(l); } });
            }
        }, 1000);

        window.onload = () => {
            load(); renderTasks();
            if (Notification.permission !== 'granted') document.getElementById('notification-banner').classList.remove('hidden');
            document.getElementById('enable-notifications').onclick = () => { Notification.requestPermission().then(p => { if (p==='granted') document.getElementById('notification-banner').classList.add('hidden'); }); };
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        };

        const modal = document.getElementById('settings-modal');
        document.getElementById('settings-btn').onclick = () => {
            document.getElementById('settings-list').innerHTML = state.tasks.map(t => `<div class="input-group"><label>${t.name} (phút)</label><input type="number" id="int-${t.id}" value="${t.interval}"></div>`).join('');
            modal.classList.remove('hidden');
        };
        document.getElementById('close-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('settings-form').onsubmit = (e) => { e.preventDefault(); state.tasks.forEach(t => { t.interval = parseInt(document.getElementById(`int-${t.id}`).value); }); save(); renderTasks(); modal.classList.add('hidden'); };
    </script>
</body>
</html>
