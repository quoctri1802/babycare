<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mẹ & Bé: Nhắc Nhở Thông Minh</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FF85A1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modern 5-Tab Navigation */
        .bottom-nav { 
            padding: 10px 5px calc(15px + env(safe-area-inset-bottom)); 
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }
        .nav-item { 
            gap: 4px; 
            font-size: 0.6rem; 
            padding: 8px 2px;
            border-radius: 15px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item.active { 
            background: rgba(255, 133, 161, 0.1);
            color: var(--p1);
            transform: translateY(-8px);
        }
        .nav-item i { width: 20px; height: 20px; }
        
        /* Knowledge Card Upgrades */
        .tip-card { 
            background: white; 
            border-radius: 25px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-left: 6px solid var(--p1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.04);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .audio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .audio-btn { 
            background: white; 
            border: 2px solid #F5F5F5; 
            border-radius: 20px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .audio-btn.playing { 
            border-color: var(--p1); 
            background: #FFF9FA; 
            box-shadow: 0 8px 20px rgba(255,133,161,0.15);
        }
        .audio-btn i { color: var(--p1); width: 24px; height: 24px; }
        .audio-btn span { font-size: 0.75rem; font-weight: 600; color: #444; }

        .profile-badge {
            background: linear-gradient(135deg, var(--p1), var(--p3));
            color: white;
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="mesh-bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

    <header>
        <h1 id="page-title">Nhắc nhở</h1>
    </header>

    <main>
        <!-- Tab 1: Nhắc nhở -->
        <div id="tab-reminders" class="tab-content active">
            <div id="profile-summary" class="profile-badge hidden" onclick="switchTab('profile', document.querySelector('[data-tab=profile]'))">
                <div class="avatar"><i data-lucide="baby" style="width: 30px; height: 30px;"></i></div>
                <div>
                    <h3 id="summary-name" style="font-size: 1.2rem; font-weight: 700;">Tên của bé</h3>
                    <p id="summary-age" style="font-size: 0.85rem; opacity: 0.9;">-- tháng tuổi</p>
                </div>
            </div>
            <div id="notification-banner" class="form-card hidden" style="display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--p1); background: #FFF9FA;">
                <p style="font-weight: 500; font-size: 0.9rem;">Bật thông báo ngay mẹ nhé!</p>
                <button id="enable-notifications" class="btn" style="width: auto; padding: 10px 20px; background: var(--p1); font-size: 0.9rem;">Bật</button>
            </div>
            <div id="task-grid" class="grid"></div>
            
            <!-- Floating Stop Alarm Button -->
            <div id="stop-alarm-container" class="hidden" style="position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 1500; width: 90%; max-width: 400px;">
                <button class="btn" onclick="stopAlert()" style="background: #2D3436; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid white;">
                    <i data-lucide="volume-x"></i> Dừng âm báo (30s)
                </button>
            </div>

            <div style="margin: 30px 0; display: flex; justify-content: center;">
                <button class="btn btn-dark" id="settings-btn" style="width: auto; padding: 12px 30px; border-radius: 50px; font-size: 1rem;">
                    <i data-lucide="settings"></i> Cài đặt
                </button>
            </div>
        </div>

        <!-- Tab 2: Phát triển -->
        <div id="tab-growth" class="tab-content">
            <div class="form-card">
                <h2 style="margin-bottom: 20px; font-weight: 700; font-size: 1.3rem;">Thông số đo</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="input-group">
                        <label>Cân nặng (kg)</label>
                        <input type="number" id="growth-weight" placeholder="0.0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>Chiều cao (cm)</label>
                        <input type="number" id="growth-height" placeholder="0">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="addGrowth()">Lưu thông số</button>
            </div>
            <div id="growth-history"></div>
        </div>

        <!-- Tab 3: Tiêm chủng -->
        <div id="tab-vaccine" class="tab-content">
            <div style="display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch;">
                <button class="btn" id="filter-all" onclick="filterVaccine('all')" style="background: var(--text); padding: 10px 20px; font-size: 0.85rem; min-width: fit-content;">Tất cả</button>
                <button class="btn" id="filter-pending" onclick="filterVaccine('pending')" style="background: #FFF; color: #666; padding: 10px 20px; font-size: 0.85rem; min-width: fit-content;">Chưa tiêm</button>
                <button class="btn" id="filter-done" onclick="filterVaccine('done')" style="background: #FFF; color: #666; padding: 10px 20px; font-size: 0.85rem; min-width: fit-content;">Đã tiêm</button>
            </div>
            <div id="vaccine-list"></div>
        </div>

        <!-- Tab 4: Cẩm nang -->
        <div id="tab-knowledge" class="tab-content">
            <div class="form-card" style="background: linear-gradient(135deg, #FF9A9E, #FAD0C4); color: #FFF; border: none;">
                <h2 style="font-weight: 700; font-size: 1.2rem; margin-bottom: 5px;">Âm thanh thư giãn</h2>
                <p style="font-size: 0.8rem; opacity: 0.9;">Giúp bé ngủ ngon hơn</p>
                <div class="audio-grid">
                    <div class="audio-btn" id="btn-noise-shush" onclick="toggleAudio('shush')">
                        <i data-lucide="mic"></i>
                        <span>Suỵt suỵt</span>
                    </div>
                    <div class="audio-btn" id="btn-noise-rain" onclick="toggleAudio('rain')">
                        <i data-lucide="cloud-rain"></i>
                        <span>Tiếng mưa</span>
                    </div>
                    <div class="audio-btn" id="btn-noise-ocean" onclick="toggleAudio('ocean')">
                        <i data-lucide="waves"></i>
                        <span>Sóng biển</span>
                    </div>
                    <div class="audio-btn" id="btn-noise-music" onclick="toggleAudio('music')">
                        <i data-lucide="music"></i>
                        <span>Nhạc thai giáo</span>
                    </div>
                </div>
            </div>
            <h2 style="margin: 25px 0 15px; font-weight: 700; font-size: 1.2rem;">Gợi ý theo độ tuổi</h2>
            <div id="knowledge-list"></div>
        </div>

        <!-- Tab 5: Hồ sơ -->
        <div id="tab-profile" class="tab-content">
            <div class="form-card">
                <h2 style="margin-bottom: 20px; font-weight: 700; font-size: 1.3rem;">Hồ sơ của bé</h2>
                <div class="input-group">
                    <label>Tên của bé</label>
                    <input type="text" id="baby-name" placeholder="Ví dụ: Cà Rốt">
                </div>
                <div class="input-group">
                    <label>Ngày sinh</label>
                    <input type="date" id="baby-dob">
                </div>
                <div class="input-group">
                    <label>Giới tính</label>
                    <select id="baby-gender">
                        <option value="none">Chọn giới tính</option>
                        <option value="boy">Bé trai</option>
                        <option value="girl">Bé gái</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="saveProfile()">Lưu hồ sơ</button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-tab="reminders">
            <i data-lucide="clock"></i>
            <span>Nhắc nhở</span>
        </div>
        <div class="nav-item" data-tab="growth">
            <i data-lucide="trending-up"></i>
            <span>Phát triển</span>
        </div>
        <div class="nav-item" data-tab="vaccine">
            <i data-lucide="shield-check"></i>
            <span>Tiêm chủng</span>
        </div>
        <div class="nav-item" data-tab="knowledge">
            <i data-lucide="book-open"></i>
            <span>Cẩm nang</span>
        </div>
        <div class="nav-item" data-tab="profile">
            <i data-lucide="user"></i>
            <span>Hồ sơ</span>
        </div>
    </nav>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.3rem; font-weight: 700;">Cài đặt</h2>
                <button id="close-modal" style="background:none; border:none; font-size: 2rem; cursor:pointer;">&times;</button>
            </div>
            <form id="settings-form">
                <div id="settings-list"></div>
                <button type="submit" class="btn btn-dark" style="margin-top: 15px; padding: 15px;">Lưu</button>
            </form>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
